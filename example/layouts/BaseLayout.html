<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Concept Design Framework — build software from independent, reusable concepts composed by declarative synchronizations.">
  <title>{{title}} — Concept Design</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf9; --surface: #ffffff; --text: #1c1917; --muted: #78716c;
      --accent: #2563eb; --accent-hover: #1d4ed8; --border: #e7e5e4;
      --code-bg: #1e293b; --code-fg: #e2e8f0;
      --radius: 8px; --max-w: 860px;
      font-family: system-ui, -apple-system, sans-serif; font-size: 17px;
      line-height: 1.7; color: var(--text); background: var(--bg);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    pre { background: var(--code-bg); color: var(--code-fg); border-radius: var(--radius); padding: 1.2rem 1.4rem; overflow-x: auto; font-size: 0.88rem; line-height: 1.55; margin: 1.2rem 0; }
    code { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 0.88em; }
    :not(pre) > code { background: #f1f5f9; color: #0f172a; padding: 0.15em 0.4em; border-radius: 4px; }
    blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1.2rem 0; color: var(--muted); }
    h1, h2, h3 { line-height: 1.3; margin: 2rem 0 0.6rem; }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    h2 { font-size: 1.4rem; font-weight: 700; }
    h3 { font-size: 1.1rem; font-weight: 600; }
    p, ul, ol { margin: 0.7rem 0; }
    ul, ol { padding-left: 1.4rem; }
    li { margin: 0.3rem 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .callout { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 1rem 1.3rem; margin: 1.2rem 0; }
    .callout-warn { background: #fffbeb; border-color: #fde68a; }
    .callout-tip { background: #f0fdf4; border-color: #bbf7d0; }
    .badge { display: inline-block; background: var(--accent); color: white; padding: 0.15em 0.55em; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem 1.5rem; margin: 0.8rem 0; }
    .card:hover { border-color: var(--accent); }
    .card h3 { margin-top: 0; }
    .card .meta { color: var(--muted); font-size: 0.85rem; }
    .hero { text-align: center; padding: 3rem 0 2rem; }
    .hero h1 { font-size: 2.6rem; }
    .hero p { font-size: 1.15rem; color: var(--muted); max-width: 620px; margin: 0.8rem auto; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <slot/>
</body>
</html>
