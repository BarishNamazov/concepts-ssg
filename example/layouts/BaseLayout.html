<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Concept Design Framework — build software from independent, reusable concepts composed by declarative synchronizations.">
  <title>{{title}} — Concept Design</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f3ea; --surface: #fffdfa; --surface-2: #f2eadb;
      --text: #17130c; --muted: #746a5a; --muted-2: #9a8f7d;
      --accent: #1f5fbf; --accent-hover: #123f86; --accent-soft: #e7f0ff;
      --warn: #b45309; --danger: #b91c1c; --border: #dfd4c1;
      --border-strong: #c6b89f; --code-bg: #172033; --code-fg: #edf4ff;
      --shadow: 0 18px 50px rgba(75, 62, 37, 0.12);
      --radius: 12px; --max-w: 900px;
      font-family: ui-serif, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: 17px; line-height: 1.72; color: var(--text); background: var(--bg);
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(31, 95, 191, 0.13), transparent 28rem),
        radial-gradient(circle at 90% 12%, rgba(180, 83, 9, 0.10), transparent 24rem),
        linear-gradient(90deg, rgba(198, 184, 159, 0.17) 1px, transparent 1px),
        linear-gradient(180deg, rgba(198, 184, 159, 0.16) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 42px 42px, 42px 42px, auto;
    }
    ::selection { background: #d9e8ff; color: #0f2550; }
    a { color: var(--accent); text-decoration: none; text-underline-offset: 0.18em; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    header { backdrop-filter: blur(14px); box-shadow: 0 1px 0 rgba(23, 19, 12, 0.04); }
    header nav a { color: var(--muted); font-family: ui-sans-serif, "Avenir Next", "Segoe UI", sans-serif; font-size: 0.86rem; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; }
    header nav a:hover { color: var(--text); text-decoration: none; }
    pre { background: linear-gradient(145deg, #172033, #101827); color: var(--code-fg); border: 1px solid #33415c; border-radius: var(--radius); padding: 1.15rem 1.3rem; overflow-x: auto; font-size: 0.86rem; line-height: 1.6; margin: 1.35rem 0; box-shadow: 0 16px 36px rgba(23, 32, 51, 0.22); }
    code { font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace; font-size: 0.86em; }
    :not(pre) > code { background: #efe5d3; color: #1d355f; border: 1px solid #ded0b9; padding: 0.14em 0.38em; border-radius: 6px; white-space: nowrap; }
    blockquote { position: relative; background: rgba(255, 253, 250, 0.72); border: 1px solid var(--border); border-left: 5px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; padding: 0.9rem 1.1rem; margin: 1.35rem 0; color: var(--muted); box-shadow: 0 8px 24px rgba(75, 62, 37, 0.06); }
    h1, h2, h3 { font-family: ui-sans-serif, "Avenir Next", "Segoe UI", sans-serif; line-height: 1.18; margin: 2.15rem 0 0.72rem; letter-spacing: -0.025em; }
    h1 { font-size: clamp(2rem, 5vw, 3.8rem); font-weight: 900; }
    h2 { font-size: clamp(1.45rem, 3vw, 2rem); font-weight: 850; padding-top: 0.25rem; }
    h2::after { content: ""; display: block; width: 3.1rem; height: 3px; margin-top: 0.45rem; background: linear-gradient(90deg, var(--accent), transparent); border-radius: 99px; }
    h3 { font-size: 1.12rem; font-weight: 800; }
    p { margin: 0.78rem 0; }
    ul, ol { margin: 0.8rem 0; padding-left: 1.45rem; }
    li { margin: 0.35rem 0; padding-left: 0.08rem; }
    li::marker { color: var(--accent); font-weight: 800; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2.4rem 0; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 1.35rem 0 1.65rem; overflow: hidden; border: 1px solid var(--border-strong); border-radius: var(--radius); background: rgba(255, 253, 250, 0.84); box-shadow: 0 14px 34px rgba(75, 62, 37, 0.09); font-size: 0.94rem; }
    thead { background: linear-gradient(180deg, #f5ecdd, #eadfc9); }
    th, td { padding: 0.72rem 0.85rem; text-align: left; vertical-align: top; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    th:last-child, td:last-child { border-right: none; }
    tbody tr:last-child td { border-bottom: none; }
    th { color: #352716; font-family: ui-sans-serif, "Avenir Next", "Segoe UI", sans-serif; font-size: 0.76rem; font-weight: 850; letter-spacing: 0.06em; text-transform: uppercase; }
    tbody tr:nth-child(even) { background: rgba(242, 234, 219, 0.38); }
    tbody tr:hover { background: rgba(231, 240, 255, 0.64); }
    td code { white-space: normal; }
    .callout { background: linear-gradient(135deg, var(--accent-soft), #fffdfa); border: 1px solid #b8cdf1; border-left: 5px solid var(--accent); border-radius: var(--radius); padding: 1rem 1.2rem; margin: 1.35rem 0; box-shadow: 0 10px 28px rgba(31, 95, 191, 0.08); }
    .callout-warn { background: linear-gradient(135deg, #fff4d6, #fffdfa); border-color: #e9c46b; border-left-color: var(--warn); }
    .callout-tip { background: linear-gradient(135deg, #e8f8ee, #fffdfa); border-color: #a7d8b7; border-left-color: #168243; }
    .badge { display: inline-block; background: var(--text); color: #fffdfa; padding: 0.18em 0.62em; border-radius: 999px; font-family: ui-sans-serif, "Avenir Next", "Segoe UI", sans-serif; font-size: 0.7rem; font-weight: 850; text-transform: uppercase; letter-spacing: 0.06em; }
    .card { background: rgba(255, 253, 250, 0.86); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.28rem 1.35rem; margin: 0.9rem 0; box-shadow: 0 10px 30px rgba(75, 62, 37, 0.07); transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease; }
    .card:hover { border-color: #9bb8e6; box-shadow: var(--shadow); transform: translateY(-2px); }
    .card h3 { margin-top: 0; }
    .card .meta { color: var(--muted); font-family: ui-sans-serif, "Avenir Next", "Segoe UI", sans-serif; font-size: 0.82rem; font-weight: 650; }
    .hero { text-align: left; padding: 4.4rem 0 2.4rem; border-bottom: 1px solid var(--border); margin-bottom: 1.2rem; }
    .hero h1 { max-width: 760px; }
    .hero p { font-size: clamp(1.08rem, 2vw, 1.32rem); color: var(--muted); max-width: 690px; margin: 0.9rem 0; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
    @media (max-width: 760px) {
      :root { font-size: 16px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
      td code { white-space: nowrap; }
      .hero { padding-top: 2.7rem; }
    }
  </style>
</head>
<body>
  <slot/>
</body>
</html>
