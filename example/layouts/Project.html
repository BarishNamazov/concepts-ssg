<BaseLayout>
  <Header />
  <div style="max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem;">
    <div style="margin-bottom: 0.5rem;">
      <span class="badge">Project</span>
      <span style="color: var(--muted); font-size: 0.85rem; margin-left: 0.5rem;">{{status}}</span>
    </div>
    <slot/>
    <hr>
    <h3>More Projects</h3>
    <div class="grid-2">
      {{#each projects}}
        <a href="{{route}}" class="card" style="text-decoration: none; color: inherit;">
          <h3>{{title}}</h3>
          <p class="meta">{{description}}</p>
        </a>
      {{/each}}
    </div>
  </div>
  <Footer />
</BaseLayout>
