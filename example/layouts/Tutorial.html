<BaseLayout>
  <Header />
  <div style="max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem;">
    <div style="display: flex; gap: 2rem; align-items: flex-start;">
      <aside style="flex: 0 0 220px; position: sticky; top: 80px; padding-top: 1.5rem;">
        <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.8rem;">Tutorial Series</h3>
        <nav style="display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.9rem;">
          {{#each tutorials}}
            <a href="{{route}}" style="padding: 0.3rem 0;">{{title}}</a>
          {{/each}}
        </nav>
      </aside>
      <main style="flex: 1; min-width: 0;">
        <div style="margin-bottom: 0.5rem;">
          <span class="badge badge-outline">Tutorial</span>
          <span style="color: var(--muted); font-size: 0.85rem; margin-left: 0.5rem;">{{date}}</span>
        </div>
        <slot/>
      </main>
    </div>
  </div>
  <Footer />
</BaseLayout>
